name: Debug fetch (temporary)

on:
  workflow_dispatch: {}

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Run debug script
        env:
          MOLIT_DATA_API_KEY: ${{ secrets.MOLIT_DATA_API_KEY }}
        run: node scripts/_debug-supply.js
