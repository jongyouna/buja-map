<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>buja-map · 자산관리 대시보드</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
<style>
  :root {
    color-scheme: light dark;
    --bg: #0b0d12;
    --panel: #14171f;
    --panel-border: #262b38;
    --text: #e6e9ef;
    --muted: #8b93a7;
    --accent-nasdaq: #5b8def;
    --accent-spacex: #ef5b6d;
    --accent-m2: #4fd1a5;
    --good: #4fd1a5;
    --bad: #ef5b6d;
  }
  @media (prefers-color-scheme: light) {
    :root {
      --bg: #f5f6f8;
      --panel: #ffffff;
      --panel-border: #e1e4ea;
      --text: #1a1d24;
      --muted: #5b6172;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, "Segoe UI", "Pretendard", "Noto Sans KR", sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 24px;
  }
  header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 20px;
  }
  h1 { font-size: 1.4rem; margin: 0; }
  .updated { color: var(--muted); font-size: 0.85rem; }
  .summary-bar {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 18px;
  }
  .summary-pill {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: 999px;
    padding: 6px 14px;
    font-size: 0.85rem;
  }
  .summary-pill .name { color: var(--muted); }
  .summary-pill .chg { font-weight: 700; }
  .summary-pill .chg.up { color: var(--good); }
  .summary-pill .chg.down { color: var(--bad); }
  .summary-pill .period { color: var(--muted); font-size: 0.75rem; }
  .cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 14px;
    margin-bottom: 22px;
  }
  .card {
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: 12px;
    padding: 16px 18px;
  }
  .card .label { color: var(--muted); font-size: 0.8rem; margin-bottom: 6px; }
  .card .value { font-size: 1.6rem; font-weight: 600; }
  .card .sub { font-size: 0.8rem; margin-top: 4px; color: var(--muted); }
  .card .sub.up { color: var(--good); }
  .card .sub.down { color: var(--bad); }
  .panel {
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: 12px;
    padding: 18px;
    margin-bottom: 20px;
  }
  .panel h2 { font-size: 1rem; margin: 0 0 4px; }
  .panel .desc { color: var(--muted); font-size: 0.82rem; margin: 0 0 14px; }
  .period-selector { display: flex; gap: 6px; margin-bottom: 14px; }
  .period-btn {
    background: transparent;
    border: 1px solid var(--panel-border);
    color: var(--muted);
    border-radius: 8px;
    padding: 5px 12px;
    font-size: 0.8rem;
    cursor: pointer;
  }
  .period-btn:hover { border-color: var(--accent-nasdaq); color: var(--text); }
  .period-btn.active { background: var(--accent-nasdaq); color: #fff; border-color: var(--accent-nasdaq); }
  .chart-wrap { position: relative; height: 340px; }
  .chart-wrap.small { height: 220px; }
  footer { color: var(--muted); font-size: 0.78rem; margin-top: 8px; line-height: 1.6; }
  .legend-note { display: flex; gap: 16px; flex-wrap: wrap; font-size: 0.8rem; color: var(--muted); margin-top: 6px; }
  .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }
  .err { color: var(--bad); padding: 40px; text-align: center; }
</style>
</head>
<body>
  <div class="summary-bar" id="summaryBar"></div>

  <header>
    <h1>buja-map · 스페이스X × M2 유동성 × 나스닥 대시보드</h1>
    <div class="updated" id="updatedAt">로딩 중...</div>
  </header>

  <div class="cards" id="cards"></div>

  <div class="panel">
    <h2>정규화 지수 비교 (시작=100)</h2>
    <p class="desc">선택한 기간의 시작일을 기준점으로 다섯 지표를 100으로 정규화하여 동일 축에서 비교합니다. SPCX는 상장일 이전 구간에 데이터가 없어 해당 기간은 공백으로 표시됩니다. M2는 월간 발표치를 계단식으로 표시합니다.</p>
    <div class="period-selector" id="periodSelector">
      <button class="period-btn" data-period="1w">1주일</button>
      <button class="period-btn" data-period="1m">한달</button>
      <button class="period-btn" data-period="6m">6개월</button>
      <button class="period-btn" data-period="1y">1년</button>
    </div>
    <div class="chart-wrap"><canvas id="mainChart"></canvas></div>
  </div>

  <div class="panel">
    <h2>롤링 상관계수 (QQQ ↔ SPCX, 10거래일 수익률 기준)</h2>
    <p class="desc">두 자산의 일간 수익률 간 10일 롤링 상관계수. +1에 가까울수록 동조화, -1에 가까울수록 역행.</p>
    <div class="chart-wrap small"><canvas id="corrChart"></canvas></div>
  </div>

  <footer id="footerNote"></footer>

<script>
const fmtPct = (v) => (v == null || isNaN(v) ? "–" : (v >= 0 ? "+" : "") + v.toFixed(2) + "%");
const fmtNum = (v, d = 2) => (v == null || isNaN(v) ? "–" : v.toLocaleString("en-US", { maximumFractionDigits: d }));

function toDate(s) { return new Date(s + "T00:00:00Z"); }

function dailyReturns(series) {
  const out = [];
  for (let i = 1; i < series.length; i++) {
    const prev = series[i - 1].close, cur = series[i].close;
    out.push({ date: series[i].date, ret: (cur - prev) / prev });
  }
  return out;
}

function pearson(a, b) {
  const n = a.length;
  if (n < 2) return null;
  const meanA = a.reduce((s, x) => s + x, 0) / n;
  const meanB = b.reduce((s, x) => s + x, 0) / n;
  let num = 0, denA = 0, denB = 0;
  for (let i = 0; i < n; i++) {
    const da = a[i] - meanA, db = b[i] - meanB;
    num += da * db; denA += da * da; denB += db * db;
  }
  const den = Math.sqrt(denA * denB);
  return den === 0 ? null : num / den;
}

function rollingCorrelation(retA, retB, window) {
  // retA, retB: [{date, ret}] aligned by date already
  const map = new Map(retB.map((d) => [d.date, d.ret]));
  const aligned = retA.filter((d) => map.has(d.date)).map((d) => ({ date: d.date, a: d.ret, b: map.get(d.date) }));
  const out = [];
  for (let i = window - 1; i < aligned.length; i++) {
    const slice = aligned.slice(i - window + 1, i + 1);
    const c = pearson(slice.map((s) => s.a), slice.map((s) => s.b));
    out.push({ date: aligned[i].date, corr: c });
  }
  return out;
}

// M2(월간) 실제 발표 시점만 100 기준으로 정규화 — 일별로 리샘플링하지 않고
// 실제 월별 데이터 포인트 그대로 사용해 계단식 그래프가 달마다 뚜렷하게 보이도록 함
function m2IndexTo100(m2series, startDate) {
  const sorted = [...m2series].sort((a, b) => a.date.localeCompare(b.date));
  let base = null;
  for (const d of sorted) {
    if (d.date <= startDate) base = d.value;
    else break;
  }
  if (base == null) base = sorted.length ? sorted[0].value : null;
  if (base == null) return [];

  const points = sorted
    .filter((d) => d.date >= startDate)
    .map((d) => ({ date: d.date, value: (d.value / base) * 100 }));
  if (points.length === 0 || points[0].date > startDate) {
    points.unshift({ date: startDate, value: 100 });
  }
  return points;
}

function indexTo100(series, valueKey, startDate) {
  const filtered = series.filter((d) => d.date >= startDate);
  if (filtered.length === 0) return [];
  const base = filtered[0][valueKey];
  return filtered.map((d) => ({ date: d.date, value: (d[valueKey] / base) * 100 }));
}

async function main() {
  let data;
  try {
    const res = await fetch("./data/data.json");
    data = await res.json();
  } catch (e) {
    document.body.innerHTML = '<div class="err">data/data.json을 불러올 수 없습니다. scripts/fetch-data.js를 먼저 실행하세요.</div>';
    return;
  }

  const nasdaq = data.series.nasdaq.data; // [{date, close}]
  const spacex = data.series.spacex.data;
  const k200 = data.series.k200 ? data.series.k200.data : []; // [{date, close}]
  const vix = data.series.vix ? data.series.vix.data : []; // [{date, close}]
  const m2 = data.series.m2.data; // [{date, value}]

  document.getElementById("updatedAt").textContent =
    "마지막 갱신: " + new Date(data.updatedAt).toLocaleString("ko-KR");

  // ---- 요약 카드 ----
  const lastN = nasdaq[nasdaq.length - 1], prevN = nasdaq[nasdaq.length - 2];
  const lastS = spacex[spacex.length - 1], prevS = spacex[spacex.length - 2];
  const lastK = k200[k200.length - 1], prevK = k200[k200.length - 2];
  const lastV = vix[vix.length - 1], prevV = vix[vix.length - 2];
  const lastM = m2[m2.length - 1], prevM = m2[m2.length - 2];
  const chgN = prevN ? ((lastN.close - prevN.close) / prevN.close) * 100 : null;
  const chgS = prevS ? ((lastS.close - prevS.close) / prevS.close) * 100 : null;
  const chgK = lastK && prevK ? ((lastK.close - prevK.close) / prevK.close) * 100 : null;
  const chgV = lastV && prevV ? ((lastV.close - prevV.close) / prevV.close) * 100 : null;
  const chgM = prevM ? ((lastM.value - prevM.value) / prevM.value) * 100 : null;

  const cards = [
    { label: `나스닥 (${data.series.nasdaq.symbol})`, value: "$" + fmtNum(lastN.close), sub: fmtPct(chgN) + " (전일 대비)", chg: chgN, asOf: lastN.date },
    { label: `스페이스X (${data.series.spacex.symbol})`, value: "$" + fmtNum(lastS.close), sub: fmtPct(chgS) + " (전일 대비)", chg: chgS, asOf: lastS.date },
  ];
  if (lastK) {
    cards.push({
      label: "코스피200 현물지수",
      value: fmtNum(lastK.close),
      sub: fmtPct(chgK) + " (전일 대비)",
      chg: chgK,
      asOf: lastK.date,
    });
  }
  if (lastV) {
    cards.push({
      label: "VIX 변동성지수",
      value: fmtNum(lastV.close),
      sub: fmtPct(chgV) + " (전일 대비)",
      chg: chgV,
      asOf: lastV.date,
    });
  }
  cards.push({ label: "미국 M2 유동성 (M2SL)", value: "$" + fmtNum(lastM.value, 1) + "B", sub: fmtPct(chgM) + " (전월 대비)", chg: chgM, asOf: lastM.date });
  document.getElementById("cards").innerHTML = cards
    .map(
      (c) => `
    <div class="card">
      <div class="label">${c.label} · 기준일 ${c.asOf}</div>
      <div class="value">${c.value}</div>
      <div class="sub ${c.chg >= 0 ? "up" : "down"}">${c.sub}</div>
    </div>`
    )
    .join("");

  // ---- 최상단 전일대비 변화 요약 ----
  const summaryItems = [
    { name: `나스닥(${data.series.nasdaq.symbol})`, chg: chgN, period: "전일 대비" },
    { name: `스페이스X(${data.series.spacex.symbol})`, chg: chgS, period: "전일 대비" },
  ];
  if (lastK) summaryItems.push({ name: "코스피200 현물지수", chg: chgK, period: "전일 대비" });
  if (lastV) summaryItems.push({ name: "VIX 변동성지수", chg: chgV, period: "전일 대비" });
  summaryItems.push({ name: "M2 유동성", chg: chgM, period: "전월 대비" });
  document.getElementById("summaryBar").innerHTML = summaryItems
    .map((s) => {
      const cls = s.chg >= 0 ? "up" : "down";
      const arrow = s.chg >= 0 ? "▲" : "▼";
      return `
    <div class="summary-pill">
      <span class="name">${s.name}</span>
      <span class="chg ${cls}">${arrow} ${fmtPct(s.chg)}</span>
      <span class="period">(${s.period})</span>
    </div>`;
    })
    .join("");

  // ---- 정규화 지수 차트 ----
  const spacexStart = spacex[0].date; // SPCX 상장일 이전으로는 확장 불가
  const lastDate = nasdaq[nasdaq.length - 1].date;
  const PERIOD_DAYS = { "1w": 7, "1m": 30, "6m": 182, "1y": 365 };

  function periodStartDate(periodKey) {
    const days = PERIOD_DAYS[periodKey];
    return new Date(toDate(lastDate).getTime() - days * 86400000).toISOString().slice(0, 10);
  }

  let mainChart = null;
  function renderMainChart(periodKey) {
    const startDate = periodStartDate(periodKey);
    const nasdaqIdx = indexTo100(nasdaq, "close", startDate);
    const spacexIdx = indexTo100(spacex, "close", startDate);
    const k200Idx = indexTo100(k200, "close", startDate);
    const vixIdx = indexTo100(vix, "close", startDate);
    const m2Idx = m2IndexTo100(m2, startDate);

    const datasets = [
      {
        label: "나스닥(QQQ)",
        data: nasdaqIdx.map((d) => ({ x: d.date, y: d.value })),
        borderColor: "#5b8def",
        backgroundColor: "#5b8def",
        borderWidth: 2,
        pointRadius: 0,
        tension: 0.15,
      },
      {
        label: "스페이스X(SPCX)",
        data: spacexIdx.map((d) => ({ x: d.date, y: d.value })),
        borderColor: "#ef5b6d",
        backgroundColor: "#ef5b6d",
        borderWidth: 2,
        pointRadius: 0,
        tension: 0.15,
      },
      {
        label: "미국 M2 유동성(월간)",
        data: m2Idx.map((d) => ({ x: d.date, y: d.value })),
        borderColor: "#4fd1a5",
        backgroundColor: "#4fd1a5",
        borderWidth: 2,
        borderDash: [4, 3],
        pointRadius: 3,
        pointHoverRadius: 5,
        stepped: "before",
        tension: 0,
      },
    ];

    if (k200Idx.length > 0) {
      datasets.push({
        label: "코스피200 현물지수",
        data: k200Idx.map((d) => ({ x: d.date, y: d.value })),
        borderColor: "#c792ea",
        backgroundColor: "#c792ea",
        borderWidth: 2,
        pointRadius: 0,
        tension: 0.15,
      });
    }

    if (vixIdx.length > 0) {
      datasets.push({
        label: "VIX 변동성지수",
        data: vixIdx.map((d) => ({ x: d.date, y: d.value })),
        borderColor: "#f2a93c",
        backgroundColor: "#f2a93c",
        borderWidth: 2,
        pointRadius: 0,
        tension: 0.15,
      });
    }

    if (mainChart) {
      mainChart.data.datasets = datasets;
      mainChart.update();
      return;
    }
    mainChart = new Chart(document.getElementById("mainChart"), {
      type: "line",
      data: { datasets },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        interaction: { mode: "index", intersect: false },
        scales: {
          x: { type: "time", time: { unit: "day" }, grid: { display: false } },
          y: { title: { display: true, text: "지수 (시작일=100)" } },
        },
        plugins: { legend: { position: "top" } },
      },
    });
  }

  const periodButtons = document.querySelectorAll("#periodSelector .period-btn");
  periodButtons.forEach((btn) => {
    btn.addEventListener("click", () => {
      periodButtons.forEach((b) => b.classList.remove("active"));
      btn.classList.add("active");
      renderMainChart(btn.dataset.period);
    });
  });
  const defaultBtn = document.querySelector('#periodSelector .period-btn[data-period="1y"]');
  defaultBtn.classList.add("active");
  renderMainChart("1y");

  // ---- 롤링 상관계수 차트 ----
  const retNasdaq = dailyReturns(nasdaq.filter((d) => d.date >= spacexStart));
  const retSpacex = dailyReturns(spacex);
  const window = Math.min(10, Math.max(3, retSpacex.length - 1));
  const corr = rollingCorrelation(retNasdaq, retSpacex, window);

  new Chart(document.getElementById("corrChart"), {
    type: "line",
    data: {
      datasets: [
        {
          label: `${window}일 롤링 상관계수`,
          data: corr.map((d) => ({ x: d.date, y: d.corr })),
          borderColor: "#e0a458",
          backgroundColor: "#e0a458",
          borderWidth: 2,
          pointRadius: 2,
          tension: 0.2,
        },
      ],
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      scales: {
        x: { type: "time", time: { unit: "day" }, grid: { display: false } },
        y: { min: -1, max: 1, title: { display: true, text: "상관계수" } },
      },
      plugins: { legend: { display: false } },
    },
  });

  document.getElementById("footerNote").innerHTML = `
    데이터 소스: 나스닥·스페이스X·코스피200 현물지수·VIX = Yahoo Finance(QQQ, SPCX, ^KS200, ^VIX 일별 종가) · M2 유동성 = FRED(M2SL, 월간, 계단식 표시)<br/>
    SPCX는 최근 상장으로 데이터 기간이 짧아(${spacex.length}거래일) 상관계수·정규화 결과의 통계적 신뢰도가 낮습니다. 참고용으로만 활용하세요.<br/>
    갱신 방법: <code>node scripts/fetch-data.js</code> 실행 후 새로고침 (매일 1회 cron/스케줄러 등록 권장)
  `;
}

main();
</script>
</body>
</html>
